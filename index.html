<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Hello World</title>
		<link data-trunk rel="rust" data-bin="web" data-cargo-features="bin-web">
		<style>
			#form {
				display: flex;
				flex-direction: column;
				gap: 1em;
				max-width: 700px;
			}
			form[data-disabled] {
				opacity: 30%;
			}
			body {
				padding: 2em;
				display: flex;
				justify-content: center;
				font-family: sans;
				font-size: 1.5em;
			}
			
			#loading[data-disabled]{
				display: none
			}
			
			#loading{
				position: absolute;
				background: transparent;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				display: flex;
				justify-content: center;
				align-items: center;
			}
			.loader {
				width: 48px;
				height: 48px;
				border: 5px solid #152849;
				border-bottom-color: #bd9853;
				border-radius: 50%;
				display: block;
				box-sizing: border-box;
				animation: rotation 1s linear infinite;
			}
			
			@keyframes rotation {
				0% {
					transform: rotate(0deg);
				}
				100% {
					transform: rotate(360deg);
				}
			}
			
			@media (prefers-color-scheme: dark) {
				body {
					background: #06070a;
					color: white;
				}
				.loader {
					border: 5px solid #1e3c60;
					border-bottom-color: #bd9853;
				}
			}
		</style>
	</head>
	<body>
		<form id="form">
			<p>See <a href="https://github.com/ModProg/cosmere-rpg-beast-extractor">the GitHub repo</a> for documentation. This works completely locally and does not upload anything to a server.</p>
			<label>
				File to extract<br>
				<input type="file" name="file" id="file" required accept=".pdf,application/pdf">
			</label>
			<label>
				Pages to extract<br>
				<select aria-label="set predefined page range" autocomplete="off" id="predefined-page-ranges">
					<option value="stormlight-worldguide">Stormlight Worldguide</option>
					<option value="stonewalkers">Stonewalkers</option>
					<option hidden disabled selected value>Select predefined page range</option>
				</select>
				<input name="pages" id="pages" required>
			</label>
			<label>
				Format<br>
				<select id="format" required>
					<option value="raw">Raw</option>
					<option value="yaml" selected>YAML</option>
					<option value="obsidian-frontmatter">Obsidian Frontmatter (.md)</option>
				</select>
			</label>
			<div>
				<input type="reset">
				<button id="confirm">
					Parse Beasts
				</button>
			</div>
		</form>
		<div id="loading" data-disabled>
			<span class="loader"></span>
		</div>
	</body>
</html>
